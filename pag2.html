<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin</title>
  <style>
    body{
      margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#f8fafc;
      background:linear-gradient(180deg,#071022 0%, #071233 60%);color:#e6eef8
    }
    .card{
      width:320px;background:rgba(255,255,255,0.05);
      padding:28px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.5);
      text-align:center
    }
    h1{margin-bottom:20px;font-size:22px}
    input{
      width:90%;padding:16px;border-radius:15px;border:none;
      margin-bottom:16px;font-size:15px
    }
    button{
      width:100%;padding:12px;border:none;border-radius:8px;cursor:pointer;
      background:#3b82f6;color:white;font-weight:600;font-size:15px
    }
    button:hover{background:#2563eb}
    .error{color:#f87171;font-size:14px;margin-top:8px;display:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Painel</h1>
    <input type="password" id="senha" placeholder="Digite a senha" />
    <button id="entrar">Entrar</button>
    <div class="error" id="erro">Senha incorreta!</div>
  </div>

  <script>
    const senhaCorreta = "MATHEUVZ"; // <- altere aqui a senha desejada
    const btn = document.getElementById('entrar');
    const input = document.getElementById('senha');
    const erro = document.getElementById('erro');

    btn.addEventListener('click', () => {
      if(input.value === senhaCorreta){
        // 🔗 redirecionamento para outra página
        window.location.href = "pag3.html"; 
      } else {
        erro.style.display = 'block';
      }
    });

    input.addEventListener('keyup', e => {
      if(e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
